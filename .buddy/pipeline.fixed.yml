- pipeline: asw
  name: Pipeline
  refs:
  - refs/heads/master
  loop:
  - asw
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  actions:
  - action: npm test
    type: BUILD
    commands: |-
      # yarn install
      npm install
      npm test
    shell: BASH
    docker_image_name: library/node
    docker_image_tag: 24
  - action: go build
    type: BUILD
    commands: |-
      go test
      go build
    shell: BASH
    volume_mappings:
    - /:/src/github.com/Dustin4444/foundry
    docker_image_name: library/golang
    docker_image_tag: 1.26
  - action: nosetests
    type: BUILD
    commands: |-
      pip install -r requirements.txt
      nosetests
    cached_dirs:
    - /root/.cache/pip
    shell: BASH
    docker_image_name: library/python
    docker_image_tag: 3.14
